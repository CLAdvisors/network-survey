name: Deploy

on:
  push:
    branches: [main] # auto-deploys to staging
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options: [staging, production]

permissions:
  id-token: write # OIDC federation to AWS — no long-lived keys
  contents: read

concurrency:
  # Serialize API release operations (deploys and previous-artifact redeploys)
  # per environment so SSM/PM2/current symlink/latest.tar.gz cannot race.
  group: api-release-${{ github.event_name == 'push' && 'staging' || inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # "production" can be given required reviewers under Settings → Environments
    environment: ${{ github.event_name == 'push' && 'staging' || inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve environment resources
        id: env
        env:
          CONFIGURED_TF_ENV: ${{ vars.TF_ENV }}
          CONFIGURED_API_HOST: ${{ vars.API_HOST }}
          CONFIGURED_DASHBOARD_HOST: ${{ vars.DASHBOARD_HOST }}
          CONFIGURED_SURVEY_HOST: ${{ vars.SURVEY_HOST }}
        run: |
          set -euo pipefail
          GH_ENV="${{ github.event_name == 'push' && 'staging' || inputs.environment }}"
          case "$GH_ENV" in
            production)
              DEFAULT_TF_ENV=prod
              DEFAULT_API_HOST=demo.ona.api.bennetts.work
              DEFAULT_DASHBOARD_HOST=demo.ona.dashboard.bennetts.work
              DEFAULT_SURVEY_HOST=demo.ona.survey.bennetts.work
              ;;
            staging)
              DEFAULT_TF_ENV=staging
              DEFAULT_API_HOST=staging.ona.api.bennetts.work
              DEFAULT_DASHBOARD_HOST=staging.ona.dashboard.bennetts.work
              DEFAULT_SURVEY_HOST=staging.ona.survey.bennetts.work
              ;;
            *) echo "Unknown environment: $GH_ENV" >&2; exit 1 ;;
          esac
          TF_ENV="${CONFIGURED_TF_ENV:-$DEFAULT_TF_ENV}"
          API_HOST="${CONFIGURED_API_HOST:-$DEFAULT_API_HOST}"
          DASHBOARD_HOST="${CONFIGURED_DASHBOARD_HOST:-$DEFAULT_DASHBOARD_HOST}"
          SURVEY_HOST="${CONFIGURED_SURVEY_HOST:-$DEFAULT_SURVEY_HOST}"

          # CloudFront resources only appear in the us-east-1 tagging API,
          # so resolution is pinned there (everything deploys to us-east-1)
          by_tag_exact() { # app-tag resource-type-filter
            local app="$1"
            local resource_type="$2"
            local arns
            arns=$(aws resourcegroupstaggingapi get-resources \
              --region us-east-1 \
              --resource-type-filters "$resource_type" \
              --tag-filters "Key=Environment,Values=$TF_ENV" "Key=App,Values=$app" \
              --query 'ResourceTagMappingList[].ResourceARN' --output text | tr '\t' '\n' | sed '/^$/d')
            local count
            count=$(printf '%s\n' "$arns" | sed '/^$/d' | wc -l | tr -d ' ')
            if [ "$count" != "1" ]; then
              echo "Expected exactly one $resource_type with Environment=$TF_ENV App=$app, found $count:" >&2
              printf '%s\n' "$arns" >&2
              exit 1
            fi
            printf '%s\n' "$arns"
          }

          instance_exact() {
            local ids
            ids=$(aws ec2 describe-instances \
              --filters "Name=tag:Environment,Values=$TF_ENV" "Name=tag:App,Values=ona-api" \
                        "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].InstanceId' --output text | tr '\t' '\n' | sed '/^$/d')
            local count
            count=$(printf '%s\n' "$ids" | sed '/^$/d' | wc -l | tr -d ' ')
            if [ "$count" != "1" ]; then
              echo "Expected exactly one running API instance with Environment=$TF_ENV App=ona-api, found $count:" >&2
              printf '%s\n' "$ids" >&2
              exit 1
            fi
            printf '%s\n' "$ids"
          }

          DASHBOARD_BUCKET=$(by_tag_exact ona-dashboard s3:bucket | sed 's|.*:::||')
          SURVEY_BUCKET=$(by_tag_exact ona-survey s3:bucket | sed 's|.*:::||')
          ARTIFACTS_BUCKET=$(by_tag_exact ona-artifacts s3:bucket | sed 's|.*:::||')
          DASHBOARD_DIST=$(by_tag_exact ona-dashboard cloudfront:distribution | sed 's|.*/||')
          SURVEY_DIST=$(by_tag_exact ona-survey cloudfront:distribution | sed 's|.*/||')
          INSTANCE_ID=$(instance_exact)

          for v in DASHBOARD_BUCKET SURVEY_BUCKET ARTIFACTS_BUCKET DASHBOARD_DIST SURVEY_DIST INSTANCE_ID; do
            if [ -z "${!v}" ] || [ "${!v}" = "None" ]; then
              echo "Failed to resolve $v for environment $TF_ENV" >&2
              exit 1
            fi
            echo "$v=${!v}" >> "$GITHUB_OUTPUT"
            echo "$v=${!v}"
          done
          echo "API_HOST=$API_HOST" >> "$GITHUB_OUTPUT"
          echo "DASHBOARD_HOST=$DASHBOARD_HOST" >> "$GITHUB_OUTPUT"
          echo "SURVEY_HOST=$SURVEY_HOST" >> "$GITHUB_OUTPUT"

      # ---------- API: package → S3 → install via SSM (no instance rebuild) ----------

      - name: Package API release artifact
        run: |
          set -euo pipefail
          STAGE_DIR=$(mktemp -d)
          mkdir -p "$STAGE_DIR/deploy" "$STAGE_DIR/db"
          rsync -a --exclude node_modules api "$STAGE_DIR/"
          cp -a db/changelogs "$STAGE_DIR/db/"
          cp scripts/deploy/remote-deploy.sh "$STAGE_DIR/deploy/"
          echo "$GITHUB_SHA" > "$STAGE_DIR/REVISION"
          tar -czf api-release.tar.gz -C "$STAGE_DIR" .

      - name: Upload artifact to S3
        run: |
          aws s3 cp api-release.tar.gz \
            "s3://${{ steps.env.outputs.ARTIFACTS_BUCKET }}/api/$GITHUB_SHA.tar.gz"

      - name: Deploy API via SSM
        run: |
          set -euo pipefail
          BUCKET="${{ steps.env.outputs.ARTIFACTS_BUCKET }}"
          INSTANCE="${{ steps.env.outputs.INSTANCE_ID }}"

          # Notes: AWS-RunShellScript executes with /bin/sh (dash on Ubuntu),
          # which has no pipefail — keep these commands POSIX. The region
          # export is required because the instance runs awscli v1.
          jq -n --arg bucket "$BUCKET" --arg sha "$GITHUB_SHA" --arg region "$AWS_REGION" '{
            commands: [
              "set -eu",
              "export AWS_DEFAULT_REGION=\($region)",
              "rm -rf /tmp/ona-deploy && mkdir -p /tmp/ona-deploy",
              "aws s3 cp s3://\($bucket)/api/\($sha).tar.gz /tmp/ona-deploy/release.tar.gz",
              "tar -xzf /tmp/ona-deploy/release.tar.gz -C /tmp/ona-deploy",
              "bash /tmp/ona-deploy/deploy/remote-deploy.sh /tmp/ona-deploy",
              "rm -rf /tmp/ona-deploy"
            ]
          }' > /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name AWS-RunShellScript \
            --comment "Deploy API $GITHUB_SHA" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $COMMAND_ID"

          # Poll until the command finishes, then surface its output
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) sleep 5 ;;
            esac
          done
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
            --query StandardOutputContent --output text
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status $STATUS; stderr:" >&2
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
              --query StandardErrorContent --output text >&2
            exit 1
          fi

      # ---------- Frontends: build → S3 sync → CloudFront invalidation ----------

      - name: Build dashboard
        working-directory: dashboard
        env:
          REACT_APP_API_PROTOCOL: https
          REACT_APP_API_HOST: ${{ steps.env.outputs.API_HOST }}
          REACT_APP_API_PORT: 443
          REACT_APP_SURVEY_PROTOCOL: https
          REACT_APP_SURVEY_ENDPOINT: ${{ steps.env.outputs.SURVEY_HOST }}
        run: |
          npm ci
          CI=false npm run build

      - name: Build survey app
        working-directory: network-survey
        env:
          REACT_APP_API_PROTOCOL: https
          REACT_APP_API_HOST: ${{ steps.env.outputs.API_HOST }}
          REACT_APP_API_PORT: 443
        run: |
          npm ci
          CI=false npm run build

      - name: Publish dashboard
        run: |
          aws s3 sync dashboard/dist "s3://${{ steps.env.outputs.DASHBOARD_BUCKET }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.env.outputs.DASHBOARD_DIST }}" --paths "/*"

      - name: Publish survey app
        run: |
          aws s3 sync network-survey/dist "s3://${{ steps.env.outputs.SURVEY_BUCKET }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.env.outputs.SURVEY_DIST }}" --paths "/*"

      - name: External smoke checks
        run: |
          set -euo pipefail
          curl -fsS "https://${{ steps.env.outputs.API_HOST }}/health" | grep -q '"database":"ok"'
          curl -fsS -o /dev/null "https://${{ steps.env.outputs.DASHBOARD_HOST }}/"
          curl -fsS -o /dev/null "https://${{ steps.env.outputs.SURVEY_HOST }}/"

          DASHBOARD_ASSET=$(find dashboard/dist/assets -maxdepth 1 -type f -name '*.js' -printf '/assets/%f\n' | head -n 1)
          SURVEY_ASSET=$(find network-survey/dist/assets -maxdepth 1 -type f -name '*.js' -printf '/assets/%f\n' | head -n 1)
          test -n "$DASHBOARD_ASSET"
          test -n "$SURVEY_ASSET"
          curl -fsS -o /dev/null "https://${{ steps.env.outputs.DASHBOARD_HOST }}$DASHBOARD_ASSET"
          curl -fsS -o /dev/null "https://${{ steps.env.outputs.SURVEY_HOST }}$SURVEY_ASSET"

      - name: Mark release as latest
        # Only after the on-instance deploy and external smoke checks pass, so
        # replacement instances bootstrap the last externally verified release.
        run: |
          aws s3 cp \
            "s3://${{ steps.env.outputs.ARTIFACTS_BUCKET }}/api/$GITHUB_SHA.tar.gz" \
            "s3://${{ steps.env.outputs.ARTIFACTS_BUCKET }}/api/latest.tar.gz"
