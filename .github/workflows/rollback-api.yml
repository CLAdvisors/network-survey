name: Redeploy API Artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to redeploy into
        required: true
        type: choice
        options: [staging, production]
      artifact_sha:
        description: Git SHA of a previously published API artifact
        required: true
        type: string
      mark_latest:
        description: Mark this artifact as latest after successful external smoke check
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  # Shared with deploy.yml so API release operations cannot race.
  group: api-release-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  redeploy-api-artifact:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve API resources
        id: env
        env:
          CONFIGURED_TF_ENV: ${{ vars.TF_ENV }}
          CONFIGURED_API_HOST: ${{ vars.API_HOST }}
        run: |
          set -euo pipefail
          case "${{ inputs.environment }}" in
            production)
              DEFAULT_TF_ENV=prod
              DEFAULT_API_HOST=demo.ona.api.bennetts.work
              ;;
            staging)
              DEFAULT_TF_ENV=staging
              DEFAULT_API_HOST=staging.ona.api.bennetts.work
              ;;
            *) echo "Unknown environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac
          TF_ENV="${CONFIGURED_TF_ENV:-$DEFAULT_TF_ENV}"
          API_HOST="${CONFIGURED_API_HOST:-$DEFAULT_API_HOST}"

          by_tag_exact() {
            local app="$1"
            local resource_type="$2"
            local arns
            arns=$(aws resourcegroupstaggingapi get-resources \
              --region us-east-1 \
              --resource-type-filters "$resource_type" \
              --tag-filters "Key=Environment,Values=$TF_ENV" "Key=App,Values=$app" \
              --query 'ResourceTagMappingList[].ResourceARN' --output text | tr '\t' '\n' | sed '/^$/d')
            local count
            count=$(printf '%s\n' "$arns" | sed '/^$/d' | wc -l | tr -d ' ')
            if [ "$count" != "1" ]; then
              echo "Expected exactly one $resource_type with Environment=$TF_ENV App=$app, found $count:" >&2
              printf '%s\n' "$arns" >&2
              exit 1
            fi
            printf '%s\n' "$arns"
          }

          instance_exact() {
            local ids
            ids=$(aws ec2 describe-instances \
              --filters "Name=tag:Environment,Values=$TF_ENV" "Name=tag:App,Values=ona-api" \
                        "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].InstanceId' --output text | tr '\t' '\n' | sed '/^$/d')
            local count
            count=$(printf '%s\n' "$ids" | sed '/^$/d' | wc -l | tr -d ' ')
            if [ "$count" != "1" ]; then
              echo "Expected exactly one running API instance with Environment=$TF_ENV App=ona-api, found $count:" >&2
              printf '%s\n' "$ids" >&2
              exit 1
            fi
            printf '%s\n' "$ids"
          }

          ARTIFACTS_BUCKET=$(by_tag_exact ona-artifacts s3:bucket | sed 's|.*:::||')
          INSTANCE_ID=$(instance_exact)

          for v in ARTIFACTS_BUCKET INSTANCE_ID; do
            if [ -z "${!v}" ] || [ "${!v}" = "None" ]; then
              echo "Failed to resolve $v for environment $TF_ENV" >&2
              exit 1
            fi
            echo "$v=${!v}" >> "$GITHUB_OUTPUT"
            echo "$v=${!v}"
          done
          echo "API_HOST=$API_HOST" >> "$GITHUB_OUTPUT"

      - name: Verify requested artifact exists
        run: |
          aws s3api head-object \
            --bucket "${{ steps.env.outputs.ARTIFACTS_BUCKET }}" \
            --key "api/${{ inputs.artifact_sha }}.tar.gz"

      - name: Redeploy selected API artifact via SSM
        run: |
          set -euo pipefail
          BUCKET="${{ steps.env.outputs.ARTIFACTS_BUCKET }}"
          INSTANCE="${{ steps.env.outputs.INSTANCE_ID }}"
          SHA="${{ inputs.artifact_sha }}"

          jq -n --arg bucket "$BUCKET" --arg sha "$SHA" --arg region "$AWS_REGION" '{
            commands: [
              "set -eu",
              "export AWS_DEFAULT_REGION=\($region)",
              "rm -rf /tmp/ona-deploy && mkdir -p /tmp/ona-deploy",
              "aws s3 cp s3://\($bucket)/api/\($sha).tar.gz /tmp/ona-deploy/release.tar.gz",
              "tar -xzf /tmp/ona-deploy/release.tar.gz -C /tmp/ona-deploy",
              "bash /tmp/ona-deploy/deploy/remote-deploy.sh /tmp/ona-deploy",
              "rm -rf /tmp/ona-deploy"
            ]
          }' > /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name AWS-RunShellScript \
            --comment "Redeploy API artifact $SHA" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $COMMAND_ID"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) sleep 5 ;;
            esac
          done
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
            --query StandardOutputContent --output text
          if [ "$STATUS" != "Success" ]; then
            echo "Artifact redeploy failed with status $STATUS; stderr:" >&2
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE" \
              --query StandardErrorContent --output text >&2
            exit 1
          fi

      - name: External API smoke check
        run: |
          curl -fsS "https://${{ steps.env.outputs.API_HOST }}/health" | grep -q '"database":"ok"'

      - name: Mark artifact as latest
        if: ${{ inputs.mark_latest }}
        run: |
          aws s3 cp \
            "s3://${{ steps.env.outputs.ARTIFACTS_BUCKET }}/api/${{ inputs.artifact_sha }}.tar.gz" \
            "s3://${{ steps.env.outputs.ARTIFACTS_BUCKET }}/api/latest.tar.gz"
