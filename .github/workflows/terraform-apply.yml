name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options: [staging, prod-v2, prod]
        default: staging
      confirm_staging_state_migrated:
        description: Must be true to apply the new terraform/envs/staging root after state migration
        required: true
        type: boolean
        default: false
      confirm_prod_state_migrated:
        description: Must be true to apply terraform/envs/prod after migrating the backend key to envs/prod/terraform.tfstate and moving frontend state addresses
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    # prod/prod-v2 should be protected with required reviewers in GitHub Environments.
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve Terraform environment
        id: env
        run: |
          set -euo pipefail
          case "${{ inputs.environment }}" in
            staging)
              WORKING_DIR=terraform/envs/staging
              WORKSPACE=
              VAR_FILE=staging.tfvars
              ;;
            prod-v2|prod)
              WORKING_DIR=terraform/envs/prod
              WORKSPACE=
              VAR_FILE=
              ;;
            production)
              echo "The old root production workspace is blocked; use prod-v2/prod (terraform/envs/prod)." >&2
              exit 1
              ;;
            *) echo "Unknown environment: ${{ inputs.environment }}" >&2; exit 1 ;;
          esac
          echo "WORKING_DIR=$WORKING_DIR" >> "$GITHUB_OUTPUT"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "VAR_FILE=$VAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Guard staging env-root apply
        if: ${{ inputs.environment == 'staging' && !inputs.confirm_staging_state_migrated }}
        run: |
          echo "Staging now points at terraform/envs/staging with backend key envs/staging/terraform.tfstate." >&2
          echo "Run the documented state migration/import steps first, then rerun with confirm_staging_state_migrated=true." >&2
          exit 1

      - name: Guard prod backend/address migration apply
        if: ${{ (inputs.environment == 'prod' || inputs.environment == 'prod-v2') && !inputs.confirm_prod_state_migrated }}
        run: |
          echo "Production now points at backend key envs/prod/terraform.tfstate and frontend resources live under module addresses." >&2
          echo "Run the documented backend migration and terraform state mv commands first, verify a no-op plan, then rerun with confirm_prod_state_migrated=true." >&2
          exit 1

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Check sensitive variables
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$TF_VAR_db_password" ]; then
            echo "TF_VAR_DB_PASSWORD secret is required for Terraform apply." >&2
            exit 1
          fi

      - name: Terraform init
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform init

      - name: Select workspace
        if: ${{ steps.env.outputs.WORKSPACE != '' }}
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform workspace select "${{ steps.env.outputs.WORKSPACE }}"

      - name: Terraform validate
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          set -euo pipefail
          args=(-input=false -out=tfplan)
          if [ -n "${{ steps.env.outputs.VAR_FILE }}" ]; then
            args+=("-var-file=${{ steps.env.outputs.VAR_FILE }}")
          fi
          terraform plan "${args[@]}"

      - name: Terraform apply
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
