name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to plan
        required: true
        type: choice
        options: [staging, production]
        default: staging

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: terraform-plan-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve Terraform environment
        id: env
        run: |
          set -euo pipefail
          GH_ENV="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}"
          case "$GH_ENV" in
            production)
              WORKSPACE=default
              VAR_FILE=prod.tfvars
              ;;
            staging)
              WORKSPACE=staging
              VAR_FILE=staging.tfvars
              ;;
            *) echo "Unknown environment: $GH_ENV" >&2; exit 1 ;;
          esac
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "VAR_FILE=$VAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Write sensitive tfvars
        run: |
          set -euo pipefail
          cat > ci.auto.tfvars <<EOF
          db_password = "${{ secrets.TF_VAR_DB_PASSWORD }}"
          EOF

      - name: Terraform init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select "${{ steps.env.outputs.WORKSPACE }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var-file="${{ steps.env.outputs.VAR_FILE }}" -input=false
