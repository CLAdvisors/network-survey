name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to plan
        required: true
        type: choice
        options: [staging, prod-v2, prod]
        default: staging

permissions:
  id-token: write
  contents: read
  pull-requests: read

concurrency:
  group: terraform-plan-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve Terraform environment
        id: env
        run: |
          set -euo pipefail
          GH_ENV="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}"
          case "$GH_ENV" in
            staging)
              WORKING_DIR=terraform
              WORKSPACE=staging
              VAR_FILE=staging.tfvars
              ;;
            prod-v2|prod)
              WORKING_DIR=terraform/envs/prod
              WORKSPACE=
              VAR_FILE=
              ;;
            production)
              echo "The old root production workspace is blocked; use prod-v2/prod (terraform/envs/prod)." >&2
              exit 1
              ;;
            *) echo "Unknown environment: $GH_ENV" >&2; exit 1 ;;
          esac
          echo "WORKING_DIR=$WORKING_DIR" >> "$GITHUB_OUTPUT"
          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "VAR_FILE=$VAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Check sensitive variables
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$TF_VAR_db_password" ]; then
            echo "TF_VAR_DB_PASSWORD secret is required for Terraform plan." >&2
            exit 1
          fi

      - name: Terraform init
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform init

      - name: Select workspace
        if: ${{ steps.env.outputs.WORKSPACE != '' }}
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform workspace select "${{ steps.env.outputs.WORKSPACE }}"

      - name: Terraform validate
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ steps.env.outputs.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: |
          set -euo pipefail
          args=(-input=false)
          if [ -n "${{ steps.env.outputs.VAR_FILE }}" ]; then
            args+=("-var-file=${{ steps.env.outputs.VAR_FILE }}")
          fi
          terraform plan "${args[@]}"
